<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requestaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Requestaurant</h1>
        <nav class="nav-links">
            <a href="register.html" class="nav-btn">Log in</a>
            <a href="settings.html" class="nav-btn">Settings</a>
        </nav>
    </header>
    <main>
        <!-- search form section -->
        <section class="search-section">
            <h2>
                What are you looking for today?
            </h2>
        <form id="searchForm" class="searchForm">
            <!-- search query -->
            <label for="q">Find your meal</label>
            <input id="q" type="text" placeholder="Type restaurant, dish..." required>
            <br>
            <!-- Price Range -->
            <label for="price">Price Range</label>
                <select id="price">
                <option value="">Any</option>
                <option value="$">$ (Budget)</option>
                <option value="$$">$$ (Mid-range)</option>
                <option value="$$$">$$$ (Fine dining)</option>
                </select>
                <br>
             <!-- Rating -->
            <label for="rating">Rating</label>
                <select id="rating">
                <option value="">Any</option>
                <option value="4">4★ and above</option>
                <option value="3">3★ and above</option>
                <option value="2">2★ and above</option>
                </select>
                <br>

            <!-- Location -->
            <label for="location">Location</label>
            <input id="location" type="text" placeholder="City or ZIP code">
            <br>

            <!-- Dietary Needs -->
            <label for="dietary">Dietary Needs</label>
                <select id="dietary">
                <option value="">No preference</option>
                <option value="vegan">Vegan</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="gluten-free">Gluten-Free</option>
                <option value="halal">Halal</option>
                <option value="kosher">Kosher</option>
                </select>
                <br>

            <!-- Atmosphere -->
            <label for="atmosphere">Atmosphere</label>
                <select id="atmosphere">
                <option value="">Any</option>
                <option value="casual">Casual</option>
                <option value="romantic">Romantic</option>
                <option value="family">Family-Friendly</option>
                <option value="luxury">Luxury</option>
                </select>
                <br>

            <button id="submit" type="submit">Search</button>
        </form>
    </section>
        <section id="results" class="results">
            <h3>Results</h3>
            <ul id="resultList"></ul>
          </section>
        <footer>
            <p>2025 Requestaurant</p>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
