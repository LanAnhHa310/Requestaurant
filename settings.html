<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings menu page</title>
</head>

<body>

    <button name="back-button">Go back to Homepage</button>

    <h1>Settings</h1>

    <!-- Settings options go here. -->
    <div class="settings-menu">
        <form>

        <!-- Front End: Users must be able to toggle between light and dark mode -->
        <div id="dark-option">
            <label for="dark-mode">Toggle dark mode</label>
            <input type="checkbox" id="dark-mode" name="dark-mode">
        </div>

       <!-- Front End: enable simplified view that reduces excess content loading -->
        <div id="performance-option">
            <label for="performance-mode">Toggle Performance mode</label>
            <input type="checkbox" id="performance-mode" name="performance-mode">
        </div>

        <!-- Front End: enable a disability mode that adjusts colors, contrast, and fonts -->
        <div id="disability-option">  
            <label for="disability-mode">Toggle disability accessibility</label>
            <input type="checkbox" id="disability-mode" name="disability-mode">
        </div>
        
        <!-- Apply settings changes by pressing the button -->
        <button type="submit" id="apply-settings-btn" name="apply-settings-btn">Apply Settings</button>

        </form>
    </div>
    
</body>

</html>
