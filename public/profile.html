<!-- This page displays the registered user profile information and options exclusive to singed-in users -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Page</title>
    <!-- Temporary embedded stylesheet until we decide if we want to have one unified website stylesheet or seperate ones -->
    <style>
        p {
            font-size: large;
        }
        h2 {
            text-align: center;
        }
        header {
            background: linear-gradient(90deg, #ff5a5f, #ff9068);
            color: white;
            text-align: center;
            padding: 20px 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        section {
            display: flex;
            flex-direction: column;
        }
        .display-block {
            display: flex;
            margin: 5px;
            border: 3px solid lightgray;
            padding: 10px;
            flex-wrap: wrap;
        }
        #top-display div {
            padding: 5px;
        }
        #add-preference form {
            display: flex;
            flex-direction: column;
        }
        .pref-div {
            margin: 3px;
            border: 3px solid lightgray;
            padding: 10px;
        }
        .bookmark-header p {
            display: inline;
        }
        .bookmark {
            display: flex;
            flex-direction: column;
            margin: 3px;
            border: 3px solid lightgray;
            padding: 10px;
        }
        .review {
            display: flex;
            flex-direction: column;
            margin: 3px;
            border: 3px solid lightgray;
            padding: 10px;
        }
        .review img {
            width: 100%;
            height: 200px;
            width: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .review-form {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    
    <!-- Navigation to other pages: homepage, settings -->
    <header>

        <nav class="nav-links"></nav>
            <button class="nav-btn" onClick="window.location.href='homepage.html'">Back To Homepage</button>
            <button class="nav-btn" onClick="window.location.href='settings.html'">Settings</button>
        </nav>
        
        <h1>( User )'s Profile Page</h1>

    </header>

    <!-- Display personal user / preference data  -->
    <section id="user-information">
        
        <div id="top-display" class="display-block">

            <div id="user-img">

                <!-- Profile picture -->
                <img src="https://placehold.co/400" alt="User profile picture">
            </div>

            <div id="user-info">
                <!-- Username -->
                <p id="usernameDisplay">Username:</p>
                <!-- Email -->
                <p id="emailDisplay">Email:</p>
                <!-- Change user info button -->
                <button id="update-info-btn">Update Profile</button>
            </div>

            <!-- <div id="info-update-panel">
                <form>
                    <input type="text" id="username-update" value="">
                    <input type="email" id="email-update" value="">
                    <button type="submit">Update Information</button>
                </form>
            </div> -->

        </div>
        <!-- End of top display -->

        <!-- Personal preferences stores set dietary restrictions, favorite restaurant themes, etc. ( basically same as search fields ) -->
        <h2>Preferences:</h2>
        <div id="user-preferences" class="display-block">

            <div id="preference-menu" class="pref-div">
                
                <h3>Add Preference:</h3>
                <form id="preference-form">
                    <!-- See https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/select for formatting reference -->

                    <label for="price-options">Price Range</label>
                    <select id="price-options" name="price-options">
                        <!-- FIX THIS: "" cannot be uploaded to the mongoDB. Change "" to new keyword. -->
                        <option value=" ">No preference</option>
                        <option value="$">$ (Budget)</option>
                        <option value="$$">$$ (Mid-range)</option>
                        <option value="$$$">$$$ (Fine dining)</option>
                    </select>
                    <br>
                    <label for="rating-options">Restaurant Rating</label>
                    <select id="rating-options" name="rating-options">
                        <option value="">No preference</option>
                        <option value="2">2★ and above</option>
                        <option value="3">3★ and above</option>
                        <option value="4">4★ and above</option>
                    </select>
                    <br>
                    <label for="location-input">Preferred Locations (city/state)</label>
                    <input type="text" name="location-input" id="location-input" value="Specify your preference here">
                    <br>
                    <label for="dietary-options">Dietary Restrictions</label>
                    <select id="dietary-options" name="dietary-options">
                        <option value="">No preference</option>
                        <option value="vegan">Vegan</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="gluten-free">Gluten-Free</option>
                        <option value="halal">Halal</option>
                        <option value="kosher">Kosher</option>
                    </select>
                    <br>
                    <label for="atmosphere-options">Ideal Atmosphere</label>
                    <select id="atmosphere-options" name="atmosphere-options">
                        <option value="">No preference</option>
                        <option value="casual">Casual</option>
                        <option value="romantic">Romantic</option>
                        <option value="family">Family-Friendly</option>
                        <option value="luxury">Luxury</option>
                    </select>
                    <br>
                    <button type="submit" id="add-preference-btn" name="add-preference-btn">Add Preference</button>
                </form>
                
            </div>
            
            <div id="preference-list" class="pref-div">

                <h3>Current Preferences:</h3>
                <ul id="current-preferences">
                    <!-- <li>Dietary restrictions:</li>
                    <li>Favorite foods:</li>
                    <li>etc.</li> -->
                </ul>

            </div>

        </div>

        <!-- Display bookmarked restaurants -->
        <h2>Favorite Restaurants:</h2>
        <div id="user-bookmarks" class="display-block">

            <!-- Preferably, make this section scroll -->

            <div class="bookmark">

                <button class="remove-bkmk-btn">Remove</button>
                <div class="bookmark-info"> 
                <!-- ^^^ Remove usesless class?! ^^^ -->
                    <img src="https://placehold.co/200" alt="restaurant image">
                    <h3>Beneditto's</h3>
                    <p>Restaurant summary</p>
                </div>
               
            </div>

        </div>
        
        <!-- Display restaurant reviews -->
        <h2>Personal Reviews:</h2>
        <div id="user-reviews" class="display-block">

            <div class="review">
                <button class="remove-review-btn">Remove</button>
                <img src="https://placehold.co/200" alt="restaurant image">
                <h3>Irish Pub</h3>
                <p>Your Review:</p>
                <form class="review-form">
                    <input type="text" class="review-text" value="Enter your review here">
                    <button type="submit" class="update-review-btn">Submit Review</button>
                </form>
               
            </div>  

        </div>
        
    </section>

    <script src="profile_script.js"></script>
</body>
</html>
